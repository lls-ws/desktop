[General]
__userfile__=true

[mainmenu]
alignment=Left
customFont=true
customFontSize=28
menu_file=/home/lls/.config/lxqt/lxqt-lls.menu
type=mainmenu

[panel1]
alignment=-1
animation-duration=0
background-color=@Variant(\0\0\0\x43\0\xff\xff\0\0\0\0\0\0\0\0)
background-image=
desktop=0
font-color=@Variant(\0\0\0\x43\0\xff\xff\0\0\0\0\0\0\0\0)
hidable=true
hide-on-overlap=false
iconSize=64
lineCount=1
lockPanel=false
opacity=100
panelSize=64
plugins=mainmenu, taskbar, tray, statusnotifier2, volume, worldclock
position=Left
reserve-space=true
show-delay=0
visible-margin=false
width=100
