[General]
__userfile__=true

[fancymenu]
customFont=true
customFontSize=18
favorites\1\desktopFile=/usr/share/applications/pcmanfm-qt.desktop
favorites\2\desktopFile=/usr/share/applications/qterminal.desktop
favorites\3\desktopFile=/var/lib/snapd/desktop/applications/firefox_firefox.desktop
favorites\4\desktopFile=/usr/share/applications/geany.desktop
favorites\5\desktopFile=/usr/share/applications/featherpad.desktop
favorites\6\desktopFile=/usr/share/applications/lubuntu-update.desktop
favorites\size=6

[panel1]
alignment=-1
animation-duration=0
background-color=@Variant(\0\0\0\x43\0\xff\xff\0\0\0\0\0\0\0\0)
background-image=
desktop=0
font-color=@Variant(\0\0\0\x43\0\xff\xff\0\0\0\0\0\0\0\0)
hidable=true
hide-on-overlap=false
iconSize=64
lineCount=1
lockPanel=false
opacity=100
panelSize=64
plugins=fancymenu, taskbar, tray, statusnotifier, volume, worldclock
position=Left
reserve-space=true
show-delay=0
visible-margin=false
width=100
width-percent=true

[statusnotifier]
attentionPeriod=5
autoHideList=@Invalid()
hideList=lxqt-notificationd, nm-tray, qlipper
reverseOrder=false

[taskbar]
alignment=Left
autoRotate=true
buttonHeight=100
buttonStyle=Icon
buttonWidth=200
closeOnMiddleClick=true
excludedList=
groupingEnabled=false
iconByClass=false
raiseOnCurrentDesktop=false
showDesktopNum=0
showGroupOnHover=true
showOnlyCurrentScreenTasks=false
showOnlyMinimizedTasks=false
showOnlyOneDesktopTasks=false
ungroupedNextToExisting=false
wheelDeltaThreshold=300
wheelEventsAction=1

[tray]
alignment=Right

[volume]
alignment=Right
ignoreMaxVolume=true

[worldclock]
alignment=Right
autoRotate=false
customFormat="'<b>'HH:mm:ss'</b><br /><font size=\"-2\">'ddd, d MMM yyyy'<br />'TT'</font>'"
dateFormatType=custom
dateLongNames=false
datePadDay=false
datePosition=below
dateShowDoW=false
dateShowYear=false
defaultTimeZone=
formatType=custom-timeonly
showDate=false
showTimezone=false
showTooltip=false
showWeekNumber=true
timeAMPM=false
timePadHour=false
timeShowSeconds=false
timeZoneWheel=true
timeZones\size=0
timezoneFormatType=iana
timezonePosition=below
useAdvancedManualFormat=false
