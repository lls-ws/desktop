[General]
__userfile__=true

[fancymenu]
alignment=Left
autoSel=true
autoSelDelay=150
buttonsAtTop=false
categoriesAtRight=false
customFont=true
customFontSize=18
filterClear=true
menu_file=/etc/xdg/menus/lxqt-applications-compact.menu
showText=false
type=fancymenu

[panel1]
alignment=-1
animation-duration=0
background-color=@Variant(\0\0\0\x43\0\xff\xff\0\0\0\0\0\0\0\0)
background-image=
desktop=0
font-color=@Variant(\0\0\0\x43\0\xff\xff\0\0\0\0\0\0\0\0)
hidable=true
hide-on-overlap=false
iconSize=64
lineCount=1
lockPanel=false
opacity=100
panelSize=64
plugins=fancymenu, taskbar, tray, statusnotifier, volume, worldclock
position=Left
reserve-space=true
show-delay=0
visible-margin=false
width=100
width-percent=true

[statusnotifier]
attentionPeriod=5
autoHideList=@Invalid()
hideList=lxqt-notificationd, nm-tray, qlipper
reverseOrder=false

[taskbar]
alignment=Left
autoRotate=true
buttonHeight=100
buttonStyle=Icon
buttonWidth=200
closeOnMiddleClick=true
excludedList=
groupingEnabled=false
iconByClass=false
raiseOnCurrentDesktop=false
showDesktopNum=0
showGroupOnHover=true
showOnlyCurrentScreenTasks=false
showOnlyMinimizedTasks=false
showOnlyOneDesktopTasks=false
ungroupedNextToExisting=false
wheelDeltaThreshold=300
wheelEventsAction=1

[tray]
alignment=Right

[volume]
alignment=Right
ignoreMaxVolume=true

[worldclock]
alignment=Right
autoRotate=false
customFormat="'<b>'HH:mm:ss'</b><br /><font size=\"-2\">'ddd, d MMM yyyy'<br />'TT'</font>'"
dateFormatType=custom
dateLongNames=false
datePadDay=false
datePosition=below
dateShowDoW=false
dateShowYear=false
defaultTimeZone=
formatType=custom-timeonly
showDate=false
showTimezone=false
showTooltip=false
showWeekNumber=true
timeAMPM=false
timePadHour=false
timeShowSeconds=false
timeZoneWheel=true
timeZones\size=0
timezoneFormatType=iana
timezonePosition=below
useAdvancedManualFormat=false
